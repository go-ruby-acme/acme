name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

# Track the latest stable Go (org convention). go.mod floor is 1.26.4.
jobs:
  # Build, vet, race-test and enforce 100% coverage on the three host OSes.
  # The whole suite drives an in-process mock ACME server (httptest), so it is
  # deterministic and needs no network / no live Let's Encrypt.
  test:
    name: test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: stable
      - run: go version
      - run: go vet ./...
      - run: go build ./...
      - name: Test + 100% coverage gate
        shell: bash
        # cgo is enabled here only so the -race detector can build; the library
        # itself is CGO-free, which the arch-native / arch-qemu jobs prove by
        # building and testing it with CGO_ENABLED=0.
        run: |
          COVERPKG=$(go list ./... | paste -sd, -)
          go test -race -coverpkg="$COVERPKG" -coverprofile=cover.out ./...
          go tool cover -func=cover.out | tail -n 25
          cov=$(go tool cover -func=cover.out | tail -1 | awk '{print $3}' | tr -d '%')
          echo "coverage: ${cov}%"
          awk -v t="$cov" 'BEGIN { exit !(t+0 >= 100.0) }' || {
            echo "::error::coverage ${cov}% < 100%"; exit 1; }

  # Validate the library on the six supported 64-bit targets. amd64/arm64 run
  # natively; the rest run the suite under qemu-user.
  arch-native:
    name: arch ${{ matrix.label }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest,    label: amd64 }
          - { os: ubuntu-24.04-arm, label: arm64 }
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: stable
      - env:
          CGO_ENABLED: "0"
        run: go env GOARCH && go test ./...

  arch-qemu:
    name: arch ${{ matrix.goarch }} (qemu)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - { goarch: riscv64, qemu: qemu-riscv64-static }
          - { goarch: loong64, qemu: qemu-loongarch64-static }
          - { goarch: ppc64le, qemu: qemu-ppc64le-static }
          - { goarch: s390x,   qemu: qemu-s390x-static }
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: stable
      - run: sudo apt-get update && sudo apt-get install -y qemu-user-static
      - name: Test under qemu (${{ matrix.goarch }})
        env:
          CGO_ENABLED: "0"
        # Emulated big-endian (s390x) and RISC targets are slow; give the run
        # a generous timeout so the mock-server round-trips do not flake.
        run: GOARCH=${{ matrix.goarch }} go test -timeout 600s -exec=${{ matrix.qemu }} ./...
